<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2563EB">
<title>消息 · AI 破局门户</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/style.css?v=18">
</head>
<body data-page="messages">
<script>window.PORTAL_STATIC = true;</script>

<div class="bg-canvas"></div>
<div class="bg-noise"></div>

<header class="nav">
  <div class="nav-inner">
    <a href="./index.html" class="brand">
      <span class="mark">AI</span>
      <span class="brand-text">
        <span class="en">AI 破局 · 行动营</span>
        <span class="zh" id="brandGroupName">AI破局门户</span>
      </span>
    </a>
    <nav class="nav-links">
      <a href="./index.html">首页</a>
      <a href="./members.html">同营人</a>
      <a href="./daily.html">每日精华</a>
      <a href="./messages.html" class="active">消息</a>
      <a href="./settings.html">设置</a>
    </nav>
    <div class="nav-actions">
      <span id="groupSwitcher" class="nav-switcher"></span>
      <button class="theme-toggle" data-theme-btn aria-label="切换主题"><span class="theme-state">🌗</span></button>
    </div>
  </div>
</header>

<section class="hero inner">
  <div class="hero-inner">
    <span class="eyebrow reveal"><span class="dot"></span>MESSAGES · 消息记录</span>
    <h1 class="h-title reveal d1">
      翻回<em>群聊原文</em>，找到某一句话
    </h1>
    <p class="h-sub reveal d2">按日期或成员筛选，浏览群内原始消息。</p>
  </div>
</section>

<main class="container section plain">
  <div class="msg-toolbar reveal">
    <input type="date" id="dateFilter">
    <select id="senderFilter">
      <option value="">全部成员</option>
    </select>
    <button class="btn btn-primary" id="applyFilter">筛选</button>
    <button class="btn btn-secondary" id="clearFilter">清除</button>
  </div>

  <div id="messagesList">
    <div class="loading">正在读取消息……</div>
  </div>
  <div class="pagination" id="pagination"></div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <span class="brand">AI 破局门户 · AI Action Portal</span>
    <span class="fine">消息来自群内公开记录，仅供营内回看</span>
  </div>
</footer>

<script src="./assets/app.js?v=17"></script>
</body>
</html>
